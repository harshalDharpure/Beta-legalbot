# Default hyperparameters — tune on VALIDATION only; test is never touched during dev.

project:
  seed: 42
  base_model: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  # Optional: existing Exp3 merged checkpoint (directory with HF format)
  exp3_checkpoint: "models/llama3.1_8b/checkpoints/exp3/final"

data:
  # Produced by data/prepare_splits.py
  train_path: "research_pipeline/data/splits/train.jsonl"
  val_path: "research_pipeline/data/splits/val.jsonl"
  test_path: "research_pipeline/data/splits/test.jsonl"
  final_train_path: "research_pipeline/data/splits/final_train.jsonl"  # train+val after tuning

training:
  max_length: 512
  max_target_length: 256
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-5
  num_epochs: 3
  warmup_ratio: 0.05
  fp16: true
  logging_steps: 50
  save_steps: 500

stage2:
  lambda_entail: 0.5
  lambda_triplet: 0.5
  triplet_margin: 0.3
  nli_model: "microsoft/deberta-v3-large"  # MNLI fine-tuned variant if available; else v3-large + map
  embedding_model: "sentence-transformers/all-mpnet-base-v2"
  ablation: "full"  # gen_only | gen_entail | gen_triplet | full

stage3_dpo:
  beta_candidates: [0.1, 0.5, 1.0]
  learning_rate: 5.0e-6
  num_epochs: 1

evaluation:
  max_new_tokens: 256

paths:
  checkpoints_root: "research_pipeline/checkpoints"
  logs_root: "research_pipeline/logs"
